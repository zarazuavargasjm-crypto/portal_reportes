<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Portal - UAEH</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="loader" class="loader-overlay" style="display:none;">
    <div class="spinner"></div>
    <p class="loader-text">Cargando, por favor espera...</p>
</div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>

<div class="login-container">
    <h2>Acceso al Portal</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label for="usuario">Usuario</label>
        <input name="usuario" id="usuario" placeholder="Ej. 8663" required>

        <label for="nip">NIP</label>
        <input name="nip" id="nip" type="password" placeholder="Tu NIP de acceso" required>

        <button type="submit">Entrar</button>
    </form>
</div>

<script>
    const form = document.querySelector("form");
    const loader = document.getElementById("loader");

    form.addEventListener("submit", () => {
        loader.style.display = "flex";
    });

    // Pequeña mejora: ocultar loader si la página tarda en cargar por red pero el usuario regresa
    window.addEventListener("pageshow", () => {
        loader.style.display = "none";
    });
</script>

<div class="footer-firma">
    Manuel Zarazúa — abril 2026
</div>

</body>
</html>
