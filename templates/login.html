<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Portal - UAEH</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="loader" class="loader-overlay" style="display:none;">
    <div class="spinner"></div>
    <p class="loader-text">Cargando...</p>
</div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>

<div class="login-container">
    <h2 style="color: #4D4D4F; text-align: center;">Acceso al Portal</h2>
    {% if error %}<p class="error" style="text-align: center;">{{ error }}</p>{% endif %}

    <form method="POST">
        <label>Usuario</label>
        <input name="usuario" placeholder="Número de empleado o cuenta" required>

        <label>NIP</label>
        <input name="nip" type="password" placeholder="Tu NIP" required>

        <button type="submit" style="background: #8A1538; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; margin-top: 20px; font-weight: bold; cursor: pointer;">Entrar</button>
    </form>
</div>

<div class="footer-firma">Manuel Zarazúa — abril 2026</div>

<script>
    const form = document.querySelector("form");
    const loader = document.getElementById("loader");
    form.addEventListener("submit", () => loader.style.display = "flex");
</script>

</body>
</html>
