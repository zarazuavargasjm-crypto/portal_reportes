<script>
    const cuerpoAdmin = document.querySelector("#tablaAdmin tbody");
    const filasAdmin = Array.from(cuerpoAdmin.querySelectorAll("tr"));
    const ac = document.getElementById("a-cuenta"), 
          af = document.getElementById("a-folio"), 
          ai = document.getElementById("a-inst"), 
          ae = document.getElementById("a-estatus");

    function ejecutarFiltroAdmin() {
        const valC = ac.value.toLowerCase();
        const valF = af.value.toLowerCase();
        const valI = ai.value.toLowerCase();
        const valE = ae.value;

        cuerpoAdmin.style.display = 'none';

        filasAdmin.forEach(r => {
            const d = r.cells;
            const cumple = d[1].innerText.toLowerCase().includes(valC) &&
                           d[9].innerText.toLowerCase().includes(valF) &&
                           d[5].innerText.toLowerCase().includes(valI) &&
                           (valE === "" || d[12].innerText.trim() === valE);
            r.style.display = cumple ? "" : "none";
        });

        cuerpoAdmin.style.display = '';
    }

    [ac, af, ai, ae].forEach(el => el.addEventListener('input', ejecutarFiltroAdmin));

    function ordenarAdmin(n) {
        const filas = Array.from(cuerpoAdmin.querySelectorAll("tr"));
        const esAsc = cuerpoAdmin.getAttribute("data-sort-dir") === "asc";

        filas.sort((a, b) => {
            const valA = a.cells[n].innerText.toLowerCase();
            const valB = b.cells[n].innerText.toLowerCase();
            return esAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });

        const frag = document.createDocumentFragment();
        filas.forEach(f => frag.appendChild(f));
        cuerpoAdmin.appendChild(frag);

        cuerpoAdmin.setAttribute("data-sort-dir", esAsc ? "desc" : "asc");
    }
</script>
