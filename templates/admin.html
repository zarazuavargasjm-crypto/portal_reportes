<script>
    function ejecutarFiltroAdmin() {
        const valC = document.getElementById("a-cuenta").value.toLowerCase();
        const valF = document.getElementById("a-folio").value.toLowerCase();
        const valI = document.getElementById("a-inst").value.toLowerCase();
        const valE = document.getElementById("a-estatus").value;
        const filas = document.querySelectorAll("#tablaAdmin tbody tr");

        filas.forEach(r => {
            const d = r.cells;
            if (d.length > 0) {
                const cumple = d[1].innerText.toLowerCase().includes(valC) &&
                               d[9].innerText.toLowerCase().includes(valF) &&
                               d[5].innerText.toLowerCase().includes(valI) &&
                               (valE === "" || d[12].innerText.trim() === valE);
                r.style.display = cumple ? "" : "none";
            }
        });
    }

    document.getElementById("a-cuenta").addEventListener('input', ejecutarFiltroAdmin);
    document.getElementById("a-folio").addEventListener('input', ejecutarFiltroAdmin);
    document.getElementById("a-inst").addEventListener('input', ejecutarFiltroAdmin);
    document.getElementById("a-estatus").addEventListener('change', ejecutarFiltroAdmin);

    function ordenarAdmin(n) {
        const table = document.getElementById("tablaAdmin");
        const tbody = table.tBodies[0];
        const rows = Array.from(tbody.rows);
        const dir = table.getAttribute("data-sort-dir") === "asc" ? -1 : 1;

        rows.sort((a, b) => {
            const aCol = a.cells[n].innerText.toLowerCase();
            const bCol = b.cells[n].innerText.toLowerCase();
            return aCol > bCol ? (1 * dir) : (-1 * dir);
        });

        table.setAttribute("data-sort-dir", dir === 1 ? "asc" : "desc");
        rows.forEach(row => tbody.appendChild(row));
    }
</script>
