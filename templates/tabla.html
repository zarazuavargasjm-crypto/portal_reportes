<script>
    // Guardamos las filas en memoria para que el acceso sea instantáneo
    const tablaCuerpo = document.querySelector("#miTabla tbody");
    const filasOriginales = Array.from(tablaCuerpo.querySelectorAll("tr"));
    const inputCuenta = document.getElementById("f-cuenta");
    const inputFolio = document.getElementById("f-folio");
    const selectEstatus = document.getElementById("f-estatus");

    function ejecutarFiltro() {
        const cVal = inputCuenta.value.toLowerCase();
        const fVal = inputFolio.value.toLowerCase();
        const eVal = selectEstatus.value;

        // Ocultamos la tabla un microsegundo para procesar todo junto (evita el lag visual)
        tablaCuerpo.style.display = 'none';

        filasOriginales.forEach(row => {
            const celdas = row.cells;
            const cumple = celdas[1].innerText.toLowerCase().includes(cVal) &&
                           celdas[9].innerText.toLowerCase().includes(fVal) &&
                           (eVal === "" || celdas[12].innerText.trim() === eVal);
            row.style.display = cumple ? "" : "none";
        });

        tablaCuerpo.style.display = '';
    }

    [inputCuenta, inputFolio, selectEstatus].forEach(el => el.addEventListener('input', ejecutarFiltro));

    function ordenar(n) {
        const filasParaOrdenar = Array.from(tablaCuerpo.querySelectorAll("tr"));
        const esAscendente = tablaCuerpo.getAttribute("data-sort-dir") === "asc";
        
        filasParaOrdenar.sort((a, b) => {
            const valA = a.cells[n].innerText.toLowerCase();
            const valB = b.cells[n].innerText.toLowerCase();
            return esAscendente ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });

        // Reinsertamos todas las filas de un solo golpe
        const fragmento = document.createDocumentFragment();
        filasParaOrdenar.forEach(fila => fragmento.appendChild(fila));
        tablaCuerpo.appendChild(fragmento);
        
        tablaCuerpo.setAttribute("data-sort-dir", esAscendente ? "desc" : "asc");
    }
</script>
