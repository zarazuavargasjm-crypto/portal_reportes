<script>
    // Inicializamos el caché de datos SOLO cuando el DOM está listo
    document.addEventListener("DOMContentLoaded", () => {
        const filas = document.querySelectorAll(".fila-dato");
        const datosAdminMemoria = Array.from(filas).map(row => {
            const d = row.cells;
            return {
                el: row,
                c: d[1]?.textContent.toLowerCase() || "",
                f: d[9]?.textContent.toLowerCase() || "",
                i: d[5]?.textContent.toLowerCase() || "",
                e: d[12]?.textContent.trim() || ""
            };
        });

        const ac = document.getElementById("a-cuenta");
        const af = document.getElementById("a-folio");
        const ai = document.getElementById("a-inst");
        const ae = document.getElementById("a-estatus");

        // Filtro optimizado con debounce
        let timerFiltro;
        function filtrarAdmin() {
            clearTimeout(timerFiltro);
            timerFiltro = setTimeout(() => {
                const valC = ac.value.toLowerCase();
                const valF = af.value.toLowerCase();
                const valI = ai.value.toLowerCase();
                const valE = ae.value;

                datosAdminMemoria.forEach(item => {
                    const vis = item.c.includes(valC) && 
                                item.f.includes(valF) && 
                                item.i.includes(valI) && 
                                (valE === "" || item.e === valE);
                    item.el.style.display = vis ? "" : "none";
                });
            }, 150); // pequeño retraso para suavizar la búsqueda
        }

        [ac, af, ai, ae].forEach(el => {
            const evento = el.tagName === 'SELECT' ? 'change' : 'input';
            el.addEventListener(evento, filtrarAdmin);
        });

        // Ordenamiento optimizado
        function ordenarAdmin(n) {
            const table = document.getElementById("tablaAdmin");
            const tbody = table.tBodies[0];
            const rows = Array.from(tbody.rows);
            const dir = table.getAttribute("data-dir") === "asc" ? -1 : 1;

            rows.sort((a, b) => {
                const vA = a.cells[n].textContent.toLowerCase();
                const vB = b.cells[n].textContent.toLowerCase();
                return vA.localeCompare(vB) * dir;
            });

            table.setAttribute("data-dir", dir === 1 ? "asc" : "desc");
            rows.forEach(r => tbody.appendChild(r));
        }

        // Exponemos ordenarAdmin para usarlo desde el HTML
        window.ordenarAdmin = ordenarAdmin;
    });
</script>
