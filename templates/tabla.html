<script>
    // Función de filtrado rápida y estable
    function filtrar() {
        const cVal = document.getElementById("f-cuenta").value.toLowerCase();
        const fVal = document.getElementById("f-folio").value.toLowerCase();
        const eVal = document.getElementById("f-estatus").value;
        const filas = document.querySelectorAll("#miTabla tbody tr");

        filas.forEach(row => {
            const cells = row.cells;
            if (cells.length > 0) {
                const cumple = cells[1].innerText.toLowerCase().includes(cVal) &&
                               cells[9].innerText.toLowerCase().includes(fVal) &&
                               (eVal === "" || cells[12].innerText.trim() === eVal);
                row.style.display = cumple ? "" : "none";
            }
        });
    }

    // Escuchar cambios en los inputs
    document.getElementById("f-cuenta").addEventListener('input', filtrar);
    document.getElementById("f-folio").addEventListener('input', filtrar);
    document.getElementById("f-estatus").addEventListener('change', filtrar);

    // Ordenamiento nativo veloz
    function ordenar(n) {
        const table = document.getElementById("miTabla");
        const tbody = table.tBodies[0];
        const rows = Array.from(tbody.rows);
        const dir = table.getAttribute("data-sort-dir") === "asc" ? -1 : 1;

        rows.sort((a, b) => {
            const aCol = a.cells[n].innerText.toLowerCase();
            const bCol = b.cells[n].innerText.toLowerCase();
            return aCol > bCol ? (1 * dir) : (-1 * dir);
        });

        table.setAttribute("data-sort-dir", dir === 1 ? "asc" : "desc");
        rows.forEach(row => tbody.appendChild(row));
    }
</script>
