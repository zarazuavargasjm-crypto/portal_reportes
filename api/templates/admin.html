<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/api/static/style.css">
</head>
<body>

<h2>Panel Administrador</h2>

<table id="tablaAdmin" data-dir="asc">
    <thead>
        <tr>
            {% for h in headers %}
                <th onclick="ordenarAdmin({{ loop.index0 }})">{{ h }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for fila in datos %}
            <tr class="fila-dato">
                {% for celda in fila %}
                    <td>{{ celda }}</td>
                {% endfor %}
            </tr>
        {% endfor %}
    </tbody>
</table>

<script>
const datosAdminMemoria = Array.from(document.querySelectorAll(".fila-dato")).map(row => {
    const d = row.cells;
    return {
        el: row,
        c: d[1]?.textContent.toLowerCase() || "",
        f: d[9]?.textContent.toLowerCase() || "",
        i: d[5]?.textContent.toLowerCase() || "",
        e: d[12]?.textContent.trim() || ""
    };
});

function ordenarAdmin(n) {
    const table = document.getElementById("tablaAdmin");
    const tbody = table.tBodies[0];
    const rows = Array.from(tbody.rows);
    const dir = table.getAttribute("data-dir") === "asc" ? -1 : 1;

    rows.sort((a, b) => {
        const vA = a.cells[n].textContent.toLowerCase();
        const vB = b.cells[n].textContent.toLowerCase();
        return vA.localeCompare(vB) * dir;
    });

    table.setAttribute("data-dir", dir === 1 ? "asc" : "desc");
    rows.forEach(r => tbody.appendChild(r));
}
</script>

</body>
</html>
